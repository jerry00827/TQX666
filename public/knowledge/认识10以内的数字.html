<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识10以内的数字</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-white p-8 leading-relaxed text-gray-800">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-green-600 mb-6">认识10以内的数字</h1>
        
        <section class="mb-8 bg-green-50 p-6 rounded-3xl">
            <h2 class="text-xl font-bold mb-4">🌟 学习目标</h2>
            <ul class="list-disc list-inside space-y-2">
                <li>能够正确地数出10以内物体的数量。</li>
                <li>会读、写0-10各数。</li>
                <li>掌握10以内数的顺序。</li>
            </ul>
        </section>

        <section class="mb-8">
            <h2 class="text-xl font-bold mb-4">🍎 数一数</h2>
            <div class="grid grid-cols-5 gap-4 text-center">
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-4xl mb-2">1</div>
                    <div class="text-sm text-gray-500">一个苹果</div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-4xl mb-2">2</div>
                    <div class="text-sm text-gray-500">两个梨子</div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-4xl mb-2">3</div>
                    <div class="text-sm text-gray-500">三只小鸟</div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-4xl mb-2">...</div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <div class="text-4xl mb-2">10</div>
                    <div class="text-sm text-gray-500">十个手指</div>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xl font-bold mb-4">✍️ 写一写</h2>
            <p class="mb-4">写数字的时候要工整，注意每个数字的起笔和收笔位置哦！</p>
            <div class="aspect-video bg-gray-100 rounded-3xl flex items-center justify-center text-gray-400">
                [这里可以放置教学视频或互动练习]
            </div>
        </section>

        <div class="text-center text-gray-400 text-sm mt-12">
            —— 祝你学习愉快！ ——
        </div>
    </div>
</body>
</html>
